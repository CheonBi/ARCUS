name: ARCUS

networks:
  arcus-network:
    driver: bridge

services:
  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}:${IMAGE_TAG:-latest}
    container_name: arcus_frontend
    restart: always
    pull_policy: always
    networks:
      - arcus-network
    environment:
      TZ: ${TZ:-Asia/Seoul}

  nginx:
    image: nginx:stable-alpine
    container_name: arcus_nginx_proxy
    restart: always
    networks:
      - arcus-network
    environment:
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - ./conf/:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
